# ── LuckyD Code CI/CD Pipeline ─────────────────────────────────────────
# Runs on every push and PR to main branch.
# Stages: Lint → Type Check → Security → Test → Build → Publish

name: CI/CD

on:
  push:
    branches: [main, master, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Allow manual trigger

env:
  PYTHON_VERSION: "3.10"
  POETRY_VERSION: "1.8.0"

jobs:
  # ── Quality Checks ──────────────────────────────────────────────────
  quality:
    name: "Code Quality"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Format Check (Black)
        run: black --check . --diff

      - name: Lint (Ruff)
        run: ruff check .

      - name: Type Check (Mypy)
        run: mypy tools llm memory project features || true
        continue-on-error: true

  # ── Security Scan ───────────────────────────────────────────────────
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    needs: [quality]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Dependency Scanning (Safety)
        run: safety check -r requirements.txt --continue-on-error || true

      - name: SAST (Bandit)
        run: bandit -r tools llm memory project --severity medium --quiet || true
        continue-on-error: true

  # ── Tests ───────────────────────────────────────────────────────────
  test:
    name: "Tests (Python ${{ matrix.python-version }})"
    runs-on: ${{ matrix.os }}
    needs: [quality]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: >
          pytest -v
          --cov=tools
          --cov=llm
          --cov=memory
          --cov=project
          --cov-report=xml
          --cov-report=term
          -m "not llm and not slow"

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Build ───────────────────────────────────────────────────────────
  build:
    name: "Build Package"
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip build

      - name: Build Package
        run: python -m build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── Publish to PyPI ─────────────────────────────────────────────────
  publish:
    name: "Publish to PyPI"
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  # ── Docker Build ────────────────────────────────────────────────────
  docker:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            luckyd/coding-agent:latest
            luckyd/coding-agent:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
